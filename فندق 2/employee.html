<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة الموظف - فندق الخليدي</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
min-height:100vh;
background:url("https://images.unsplash.com/photo-1520250497591-112f2f40a3f4") 
   no-repeat center/cover fixed;
color:white;
position:relative;
}

/* طبقة تغميش فوق البدي */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
z-index:-1;
transition:.4s;
}
/*نهاري*/
body.light::before{
background:rgba(255,255,255,.25);
}
/*ليلي*/
body.dark::before{
background:rgba(0,0,0,.65);
}

/*المحتوى الراس */

/*   الهيدر */
header{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(15,23,42,.85);
backdrop-filter:blur(15px);
padding:18px 25px;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.1);
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.header-actions{
display:flex;
align-items:center;
gap:15px;
flex-shrink:0;
}

.logout{
position:static;
background:linear-gradient(135deg,#ef4444,#dc2626);
color:white;
border:none;
padding:10px 18px;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.logout:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(239,68,68,.4);
}

/*   التقسيم في الصفحة نفسة يقسمة لجانبي والصفحة الاساسي الا يضهر فيها*/

.container{
display:flex;
}

/*  القائمة الجانبية */

.sidebar{
width:250px;
padding:20px;
background:rgba(15,23,42,.88);
backdrop-filter:blur(18px);
border-left:1px solid rgba(255,255,255,.08);
min-height:100vh;
}

/* الوضع النهاري */
body.light .sidebar{
background:rgba(255,255,255,.75);

border-left:1px solid rgba(0,0,0,.08);
}

body.light .sidebar button{
background:rgba(0,0,0,.06);
color:#111827;
}

body.light header{
background:rgba(255,255,255,.75);
color:#111827;
}

body.light .card{
background:rgba(255,255,255,.65);
color:#111827;
}

body.light input{
background:rgba(255,255,255,.8);
color:#111827;
}

body.light input::placeholder{
color:#555;
}

body.light table{
background:rgba(255,255,255,.55);
color:#111827;
}

body.light th{
background:rgba(255,255,255,.8);
}

body.light td{
border-top:1px solid rgba(0,0,0,.08);
}
body.light #menuBox button{
background:rgba(0,0,0,.08);
color:#111827;
}
.sidebar button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:14px;
background:rgba(255,255,255,.08);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.sidebar button:hover{
background:linear-gradient(135deg,#3b82f6,#06b6d4);
transform:translateX(-5px);
}


/*  المحتوى */

.content{
flex:1;
padding:30px;
}

.page{
display:none;
}

.active{
display:block;
animation:fade .4s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/*  الكروت  */

.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
padding:25px;
border-radius:24px;
margin-bottom:20px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.card h3{
margin-bottom:20px;
font-size:25px;
}

/*  الإحصائيات   */

.card p{
font-size:18px;
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.card p:last-child{
border:none;
}

.card span{
font-weight:bold;
color:#60a5fa;
}

/* 
   الإدخال
 */

input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.15);
color:white;
font-size:15px;
}

input::placeholder{
color:#ddd;
}

/*  الأزرار  */

button{
border:none;
cursor:pointer;
}

.book{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
font-size:16px;
font-weight:bold;
color:white;
background:linear-gradient(135deg,#2563eb,#06b6d4);
transition:.35s;
}

.book:hover{
transform:translateY(-4px);
box-shadow:0 15px 30px rgba(37,99,235,.4);
}

/* 
   الجدول  */

table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:18px;
background:rgba(255,255,255,.08);
}

th{
padding:15px;
background:rgba(255,255,255,.15);
font-size:15px;
}

td{
padding:14px;
border-top:1px solid rgba(255,255,255,.08);
}

tr:hover{
background:rgba(255,255,255,.06);
}

/* 
   رسالة الخطأ
 */

#msg{
margin-top:10px;
color:#f87171;
font-weight:bold;
}

/*  سويتش الوضع المفتاح حق الليلي والنهاري */
.switch {
position: relative;
display: inline-block;
width: 55px;
height: 28px;
}

.switch input {
width: 0;
height: 0;
}
/*جانبي حق الوضع اليلي والنه*/
.slider {
position: absolute;
cursor: pointer;
top: 0;
left: 0;
right: 0;
bottom: 0;
background-color: rgba(255,255,255,.25);
transition: .4s;
border-radius: 34px;
border:1px solid rgba(255,255,255,.3);
}

.slider:before {
position: absolute;
content: "";
height: 20px;
width: 20px;
left: 4px;
bottom: 3px;
background-color: white;
transition: .4s;
border-radius: 50%;
}

input:checked + .slider {
background: linear-gradient(135deg,#facc15,#3b82f6);
}

input:checked + .slider:before {
transform: translateX(26px);
}
/*اذة الا يخلي القاىمة تختفي تحتة الازرارر*/
#menuBox{
display:none;
flex-direction:column;
}
/*اذة الازرار الا تحت القائمة*/

#menuBox button{
width:100%;
padding:14px;
margin:6px 0;
border:none;
border-radius:14px;
background:rgba(255,255,255,.08);
color:white;
font-size:15px;
cursor:pointer;
transition:.3s;
}

#menuBox button:hover{
background:linear-gradient(135deg,#3b82f6,#06b6d4);
transform:translateX(-5px);
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
}

.content{
padding:15px;
}

header h1{
font-size:24px;
}

.logout{
position:static;
margin-top:10px;
}
}
@media(max-width:600px){

header{
flex-direction:column;
text-align:center;
}

header h1{
font-size:20px;
}

.header-actions{
justify-content:center;
width:100%;
}

.card{
padding:15px;
}

.card h3{
font-size:20px;
}

input,
.book{
font-size:14px;
}

}

</style>
</head>

<body>

<header>
  <h1>فندق الخليدي - لوحة الموظف</h1>

  <div class="header-actions">
    <label class="switch">
      <input type="checkbox" id="themeSwitch" onchange="toggleTheme()">
      <span class="slider"></span>
    </label>

    <button class="logout" onclick="logout()">خروج</button>
  </div>
</header>

<div class="container">

<div class="sidebar">

<button class="main-btn" onclick="toggleMenu()">
☰ الرئيسية
</button>

<div id="menuBox">

<button onclick="show('dashboard')">لوحة التحكم</button>
<button onclick="show('booking')">حجز غرفة</button>
<button onclick="show('customers')">العملاء</button>

<button onclick="goRooms()">الغرف</button>
<button onclick="goBookings()">الحجوزات</button>

</div>

</div>

<!--     المحتوى الرئيسي -->
<div class="content">

<!-- صفحة الإحصائيات -->
<div id="dashboard" class="page active">
<div class="card">
<h3>الإحصائيات</h3>

<p>الغرف: <span id="roomCount">0</span></p>
<p>متاحة: <span id="availCount">0</span></p>
<p>محجوزة: <span id="bookCount">0</span></p>
<p>الحجوزات: <span id="resCount">0</span></p>

</div>
</div>

<!-- صفحة إدخال بيانات العميل -->
<div id="booking" class="page">

<div class="card">
<h3>بيانات العميل</h3>

<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="الهاتف">
<input id="idCard" placeholder="رقم الهوية">

<button class="book" onclick="startBooking()">التالي</button>

<p id="msg"></p>

</div>
</div>

<!-- صفحة عرض العملاء -->
<div id="customers" class="page">

<div class="card">
<h3>العملاء</h3>

<table>
<tr>
<th>الاسم</th>
<th>الهاتف</th>
<th>الهوية</th>
<th>الغرفة</th>
</tr>

<tbody id="customersTable"></tbody>
</table>

</div>
</div>

</div>
</div>

<script>

let customersTable = document.getElementById("customersTable");

let roomCount = document.getElementById("roomCount");
let availCount = document.getElementById("availCount");
let bookCount = document.getElementById("bookCount");
let resCount = document.getElementById("resCount");

/*  تحميل البيانات من localStorage */
let customers = JSON.parse(localStorage.getItem("customers")) || [];
let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
let rooms = JSON.parse(localStorage.getItem("rooms")) || [];

/*  تغيير الصفحات */
function show(id){
document.querySelectorAll(".page")
.forEach(p => p.classList.remove("active"));

document.getElementById(id).classList.add("active");

/* تحديث حسب الصفحة */
if(id === "customers") loadCustomers();
if(id === "dashboard") updateStats();
}

/*  بدء الحجز (حفظ بيانات العميل )*/
function startBooking(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let idCard = document.getElementById("idCard").value;

/* التحقق من الإدخال */
if(!name || !phone || !idCard){
document.getElementById("msg").innerText = "يرجى إدخال كل البيانات";
return;
}

/* حفظ بيانات العميل  */
localStorage.setItem("tempCustomer", JSON.stringify({
name, phone, idCard
}));

/* الانتقال لصفحة الغرف */
location = "rooms.html";
}

/*  تحميل العملاء في الجدول */
function loadCustomers(){
customersTable.innerHTML = "";

customers.forEach(c => {
customersTable.innerHTML += `
<tr>
<td>${c.name}</td>
<td>${c.phone}</td>
<td>${c.id}</td>
<td>${c.room || "-"}</td>
</tr>`;
});
}

/* الانتقال لصفحة الغرف */
function goRooms(){
location = "rooms.html";
}

/* الانتقال لصفحة الحجوزات */
function goBookings(){
location = "booking.html";
}

/*  تسجيل الخروج */
function logout(){
localStorage.removeItem("user");
location = "login.html";
}

/*  تحديث الإحصائيات */
function updateStats(){
rooms = JSON.parse(localStorage.getItem("rooms")) || [];
bookings = JSON.parse(localStorage.getItem("bookings")) || [];

roomCount.innerText = rooms.length;
availCount.innerText = rooms.filter(r => r.status === "متاحة").length;
bookCount.innerText = rooms.filter(r => r.status !== "متاحة").length;
resCount.innerText = bookings.length;
}
/*  تحديث الوضع اليلي والنهاري */
function toggleTheme(){

let sw = document.getElementById("themeSwitch");

if(sw.checked){
document.body.classList.remove("dark");
document.body.classList.add("light");
localStorage.setItem("theme","light");
}else{
document.body.classList.remove("light");
document.body.classList.add("dark");
localStorage.setItem("theme","dark");
}

}


/* تشغيل الوضع عند فتح الصفحة */
let sw = document.getElementById("themeSwitch");

if(localStorage.getItem("theme")==="light"){
sw.checked = true;
document.body.classList.add("light");
}else{
document.body.classList.add("dark");
}
function toggleMenu(){
let menu = document.getElementById("menuBox");

if(menu.style.display === "flex"){
menu.style.display = "none";
}else{
menu.style.display = "flex";
}
}
/* تشغيل الإحصائيات عند فتح الصفحة */
updateStats();

</script>

</body>
</html>
