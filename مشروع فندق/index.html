<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>فندق الخليدي</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(to right,#1f2937,#111827);
    color:white;
}

/* الحاوية */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* الهيدر */
.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    margin:0;
    font-size:34px;
}

.header h2{
    color:#93c5fd;
    margin-top:10px;
}

/* البوكس الرئيسي */
.box{
    background:#fff;
    color:#000;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* الروابط */
.links{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

.links a{
    text-decoration:none;
    background:blue;
    color:#fff;
    padding:12px 20px;
    border-radius:8px;
    transition:0.3s;
}

.links a:hover{
    background:rgb(15, 9, 1);
}
.eng{
    background: #111827;
    color: aqua;
    margin: left 8px; 
    
}

</style>

</head>

<body>

<div class="container">

    <!-- العنوان -->
    <div class="header">
        <h1>مرحباً بك في فندق الخليدي</h1>
        <h2>نظام إدارة وحجز الغرف</h2>
    </div>

    <!-- الروابط -->
    <div class="box">

        <h3 style="text-align:center;">الدخول إلى النظام</h3>

        <div class="links">
            <a href="login.html">تسجيل الدخول</a>
            <a href="view.html">نظرة عامة على الفندق</a>
        </div>

    </div>

</div>

</body>
</html>
